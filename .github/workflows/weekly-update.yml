name: Weekly Update

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Weekly

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@master
        with:
          persist-credentials: true

      - name: Dependencies
        run: pip install -r ./requirements.txt

      - name: Main
        run: python3 src/main.py 180 "https://www.youtube.com/@QuonTama"

      - name: Commit
        run: |
          git add data
          git commit -m "Weekly update"
          git push
