name: Deploy Web

permissions:
  contents: write

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@master
        with:
          persist-credentials: false


      - name: Copy data 📋
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate; sudo dpkg-reconfigure man-db
          sudo apt install rename
          cp -r ./data ./youtubert-web/public/data
          cd ./youtubert-web/public/data
          rename 's/^.* - (.*[.]json)$/$1/' *.json
          python3 src/data_reader.py > ./youtubert-web/public/data/channels.json

      - name: Stamp build number 💮
        env:
          BUILD_NUMBER: ${{github.run_number}}
        run: sed -i -- "s/%BUILD_NUMBER%/$(date +'%Y%m%d.%H%M').$BUILD_NUMBER/g" ./youtubert-web/public/index.html

      - name: Install 🔧
        run: npm install
        working-directory: ./youtubert-web

      - name: Build 🏗️
        run: npm run build
        working-directory: ./youtubert-web

      - name: Deploy to GH Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./youtubert-web/build
